<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="phd-popup">
    <div class="phd-popup__header">
      <h1 class="phd-popup__title">PhishBuster</h1>
      <div class="phd-popup__lang-group" id="langGroup">
        <button class="phd-popup__lang-btn phd-popup__lang-btn--active" data-lang="en">ENG</button>
        <button class="phd-popup__lang-btn" data-lang="es">ESP</button>
        <button class="phd-popup__lang-btn" data-lang="ca">CAT</button>
      </div>
    </div>

    <!-- Auth: Login/Register -->
    <div id="authSection" class="phd-popup__auth" style="display:none;">
      <div class="phd-popup__auth-tabs">
        <button class="phd-popup__auth-tab phd-popup__auth-tab--active" id="tabLogin" data-i18n="login">Log in</button>
        <button class="phd-popup__auth-tab" id="tabRegister" data-i18n="register">Register</button>
      </div>
      <input type="email" id="authEmail" class="phd-popup__input" data-i18n-placeholder="email_placeholder" placeholder="Email">
      <div class="phd-popup__password-wrap">
        <input type="password" id="authPassword" class="phd-popup__input" data-i18n-placeholder="password_placeholder" placeholder="Password">
        <button type="button" id="togglePassword" class="phd-popup__eye" title="Show password">&#x1F441;</button>
      </div>
      <button id="authBtn" class="phd-popup__save" data-i18n="login">Log in</button>
      <div id="authMsg" class="phd-popup__msg"></div>
    </div>

    <!-- Verification pending -->
    <div id="verifySection" class="phd-popup__verify" style="display:none;">
      <div class="phd-popup__verify-icon">&#x2709;</div>
      <p class="phd-popup__verify-title" data-i18n="verify_title">Check your email</p>
      <p class="phd-popup__verify-text"><span data-i18n="verify_text_before">We sent a verification link to</span> <strong id="verifyEmail"></strong>. <span data-i18n="verify_text_after">Click the link to activate your account.</span></p>
      <p class="phd-popup__verify-hint" data-i18n="verify_hint">Can't find it? Check your spam/junk folder.</p>
      <button id="resendBtn" class="phd-popup__save" data-i18n="resend">Resend verification email</button>
      <div id="verifyMsg" class="phd-popup__msg"></div>
      <button id="backToLoginBtn" class="phd-popup__link-btn" data-i18n="back_to_login">Back to login</button>
    </div>

    <!-- Logged-in UI -->
    <div id="appSection" style="display:none;">
      <div class="phd-popup__user-bar">
        <span class="phd-popup__user-email" id="userEmail"></span>
        <button id="logoutBtn" class="phd-popup__logout" data-i18n="logout">Log out</button>
      </div>

      <div class="phd-popup__status">
        <span class="phd-popup__dot" id="statusDot"></span>
        <span class="phd-popup__status-text" id="statusText" data-i18n="checking">Checking...</span>
      </div>

      <div class="phd-popup__quota">
        <div class="phd-popup__plan-info">
          <span class="phd-popup__plan-badge" id="planBadge">Free</span>
          <span class="phd-popup__plan-expiry" id="planExpiry"></span>
        </div>
        <div class="phd-popup__quota-info">
          <span class="phd-popup__quota-count" id="quotaCount">0</span>
          <span class="phd-popup__quota-sep">/</span>
          <span class="phd-popup__quota-limit" id="quotaLimit">10</span>
          <span class="phd-popup__quota-label" data-i18n="analyses_today">analyses today</span>
        </div>
        <div class="phd-popup__quota-bar">
          <div class="phd-popup__quota-fill" id="quotaFill"></div>
        </div>
        <div class="phd-popup__upgrade-buttons" id="upgradeButtons">
          <button class="phd-popup__upgrade-btn" data-plan="basic" data-i18n="upgrade_basic">Basic &mdash; 50/day &mdash; 1&euro;</button>
          <button class="phd-popup__upgrade-btn phd-popup__upgrade-btn--pro" data-plan="pro" data-i18n="upgrade_pro">Pro &mdash; 250/day &mdash; 3&euro;</button>
        </div>
      </div>

      <div id="saveMsg" class="phd-popup__msg"></div>

      <div class="phd-popup__section">
        <label class="phd-popup__label" data-i18n="trusted_senders">Trusted senders</label>
        <div id="trustedList" class="phd-popup__trusted-list"></div>
        <div class="phd-popup__trusted-add">
          <input type="text" id="trustedInput" class="phd-popup__input" placeholder="email@example.com">
          <button id="addTrustedBtn" class="phd-popup__add-btn">+</button>
        </div>
        <div class="phd-popup__csv-row">
          <button id="csvBtn" class="phd-popup__csv-btn" data-i18n="import_csv">Import CSV</button>
          <input type="file" id="csvFile" accept=".csv,.txt" hidden>
          <span id="csvMsg" class="phd-popup__csv-msg"></span>
        </div>
      </div>

      <div class="phd-popup__section">
        <label class="phd-popup__label" data-i18n="trusted_domains">Trusted domains</label>
        <div id="domainList" class="phd-popup__trusted-list"></div>
        <div class="phd-popup__trusted-add">
          <input type="text" id="domainInput" class="phd-popup__input" placeholder="example.com">
          <button id="addDomainBtn" class="phd-popup__add-btn">+</button>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
